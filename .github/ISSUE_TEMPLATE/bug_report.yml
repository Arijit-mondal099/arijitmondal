name: Bug report
description: Report something that's broken or behaves unexpectedly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please fill in as much of the form as you can — it makes triage much faster.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I click X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps a maintainer can follow.
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: Chrome 130 on macOS 14
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console / network logs
      description: Paste any relevant errors. They will be auto-formatted.
      render: shell
    validations:
      required: false
