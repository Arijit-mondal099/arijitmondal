name: E2E

on:
  pull_request:
    branches: [main]
  # Manual trigger for ad-hoc runs against any branch.
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  puppeteer:
    name: Puppeteer E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      - name: Install Chromium dependencies
        # Puppeteer ships its own Chromium but needs the system shared
        # libraries it links against on Ubuntu runners.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxkbcommon0 \
            libxcomposite1 libxdamage1 libxrandr2 libgbm1 libpango-1.0-0 \
            libcairo2 libasound2t64

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # `jest-puppeteer.config.cjs` boots `npm run dev` on port 3000 itself,
          # so we just need the env vars the dev server expects.
          EMAIL_USER: ci@example.com
          EMAIL_PASSWORD: ci-placeholder

      - name: Upload Puppeteer artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-${{ github.run_id }}
          path: |
            tests/**/screenshots/**
            tests/**/*.log
          if-no-files-found: ignore
          retention-days: 7
